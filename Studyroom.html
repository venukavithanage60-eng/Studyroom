<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancow Arena | Elite Focus</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; transition: all 0.25s ease; }
        
        body { background: var(--bg); background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 480px; position: relative; }

        .card { background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; text-align: left; padding-left: 10px; }

        input, select { width: 100%; padding: 14px; border-radius: 16px; border: 2px solid #334155; background: rgba(15, 23, 42, 0.9); color: white; outline: none; margin-bottom: 12px; font-size: 14px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }

        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main { background: var(--primary); color: white; margin-top: 10px; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4); }
        .btn-ghost { background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid #334155; margin-top: 10px; }

        /* Analytics Stats Bar */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box small { font-size: 9px; color: #94a3b8; font-weight: 700; }
        .stat-box div { font-size: 18px; font-weight: 900; color: var(--primary); }

        /* XP Progress Bar */
        .progress-container { width: 100%; height: 6px; background: #334155; border-radius: 10px; margin: 10px 0 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 10px var(--primary); }

        #roomArea { display: none; }
        .timer-circle { width: 200px; height: 200px; margin: 25px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 5px solid var(--primary); border-radius: 50%; background: rgba(0,0,0,0.4); box-shadow: 0 0 40px rgba(34, 197, 94, 0.25); }
        #timer { font-size: 50px; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* Congrats Overlay */
        #congratsOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        
        .chat-box { height: 120px; overflow-y: auto; text-align: left; font-size: 13px; margin: 15px 0; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .msg b { color: var(--primary); font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="congratsOverlay">
    <div style="font-size: 60px; margin-bottom: 10px;">🏆</div>
    <h1 style="color: var(--primary); font-size: 36px; font-weight: 900; margin-bottom: 5px;">MISSION COMPLETE</h1>
    <p style="color: #94a3b8;">Data synced to Biozone HQ.</p>
    <div style="margin: 30px 0;">
        <div style="font-size: 12px; font-weight: 800; color: #facc15;">FOCUS XP GAINED</div>
        <div style="font-size: 48px; font-weight: 900;">+<span id="earnedXP">0</span></div>
    </div>
    <button class="btn btn-main" style="width: 240px;" onclick="location.reload()">CLAIM REWARDS</button>
</div>

<div class="container">
    <div id="lobbyArea" class="card">
        <h2 style="margin-bottom: 5px; font-weight: 900;">PANCOW ARENA</h2>
        <p style="font-size: 11px; color: #94a3b8; margin-bottom: 25px;">Level Up Your Focus</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <small>DAILY GOAL</small>
                <div id="dailyText">0m</div>
            </div>
            <div class="stat-box">
                <small>TOTAL XP</small>
                <div id="xpText">0m</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label">RANK: <span id="rankText" style="color: var(--primary);">ROOKIE</span></span>
            <span id="nextRankText" style="font-size: 9px; color: #64748b; font-weight: 700;">XP TO NEXT: 100m</span>
        </div>
        <div class="progress-container">
            <div id="xpProgress" class="progress-fill"></div>
        </div>

        <span class="label">Hero Name</span>
        <input type="text" id="nameInput" placeholder="Enter Alias..." maxlength="15">

        <span class="label">Mission Duration</span>
        <select id="timeSelect">
            <option value="10">10 Minutes</option>
            <option value="25" selected>25 Minutes</option>
            <option value="50">50 Minutes</option>
            <option value="60">60 Minutes</option>
            <option value="90">90 Minutes</option>
            <option value="1">1 Min (Test)</option>
        </select>

        <button class="btn btn-main" onclick="createRoom()">⚔️ START MISSION</button>
        <input type="text" id="joinCode" placeholder="Enter 4-Digit Squad Code" maxlength="4" style="margin-top:15px; text-align: center; letter-spacing: 5px;">
        <button class="btn btn-ghost" onclick="joinRoom()">JOIN SQUAD</button>
    </div>

    <div id="roomArea" class="card">
        <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 800;">
            <span style="color: #64748b;">ARENA: <span id="roomCodeText" style="color:var(--primary);">0000</span></span>
            <span style="color: var(--primary);">● ACTIVE</span>
        </div>
        
        <div class="timer-circle">
            <div id="timer">00:00</div>
            <div style="font-size: 9px; color: #94a3b8; font-weight: 800; margin-top: 5px;">TIME REMAINING</div>
        </div>

        <span class="label" style="text-align: center;">Ambience Stream</span>
        <select id="ambienceSelect" onchange="updateAmbience()">
            <option value="none">🔇 Silence</option>
            <option value="rain.mp3">🌧️ Rainy Roof</option>
            <option value="clock.mp3">⏳ Ticking Clock</option>
            <option value="space.mp3">🛸 Deep Space</option>
        </select>

        <div class="chat-box" id="chatDisplay"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chatInput" placeholder="Message squad..." style="padding: 12px; margin-bottom:0;">
            <button class="btn btn-main" style="width:50px; margin:0; padding:0;" onclick="sendMessage()">➔</button>
        </div>

        <div id="memberList" style="margin-top:15px;"></div>
        <button class="btn" style="background: transparent; color: #ef4444; font-size: 11px; margin-top: 20px; font-weight: 800;" onclick="location.reload()">ABANDON MISSION</button>
    </div>
</div>

<audio id="ambiencePlayer" loop></audio>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDKvaLXC7nSM62hC_0PXx-_iXjJX_Kw7WQ",
        authDomain: "pancow.firebaseapp.com",
        projectId: "pancow"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- ANALYTICS & STATS ---
    function loadAnalytics() {
        let totalXP = parseInt(localStorage.getItem("pancow_xp") || "0");
        let dailyXP = parseInt(localStorage.getItem("pancow_daily_xp") || "0");
        let lastDate = localStorage.getItem("pancow_last_date");
        let today = new Date().toDateString();

        if(lastDate !== today) {
            dailyXP = 0;
            localStorage.setItem("pancow_last_date", today);
            localStorage.setItem("pancow_daily_xp", "0");
        }

        document.getElementById("xpText").innerText = totalXP + "m";
        document.getElementById("dailyText").innerText = dailyXP + "m";

        // Rank System
        let rank = "ROOKIE";
        let nextXP = 100;
        if(totalXP >= 100) { rank = "SOLDIER"; nextXP = 500; }
        if(totalXP >= 500) { rank = "ELITE"; nextXP = 1000; }
        if(totalXP >= 1000) { rank = "LEGEND"; nextXP = 5000; }

        document.getElementById("rankText").innerText = rank;
        document.getElementById("nextRankText").innerText = `XP TO NEXT: ${nextXP}m`;
        
        let progress = (totalXP / nextXP) * 100;
        document.getElementById("xpProgress").style.width = Math.min(progress, 100) + "%";
    }
    loadAnalytics();

    // --- VARS ---
    let myName = localStorage.getItem("pancow_name") || "";
    if(myName) document.getElementById("nameInput").value = myName;

    let currentRoom = "";
    let secondsRemaining = 0;
    let timerInterval;
    let missionMins = 0;

    async function createRoom() {
        myName = document.getElementById("nameInput").value.trim();
        if(!myName) return alert("Enter Alias!");
        localStorage.setItem("pancow_name", myName);

        const code = Math.floor(1000 + Math.random() * 9000).toString();
        missionMins = document.getElementById("timeSelect").value;

        await db.collection("study_rooms").doc(code).set({
            duration: missionMins, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        enterRoom(code, missionMins);
    }

    async function joinRoom() {
        myName = document.getElementById("nameInput").value.trim();
        const code = document.getElementById("joinCode").value.trim();
        if(!myName || !code) return alert("Details missing!");
        const doc = await db.collection("study_rooms").doc(code).get();
        if(doc.exists) {
            missionMins = doc.data().duration;
            enterRoom(code, missionMins);
        }
    }

    function enterRoom(code, mins) {
        currentRoom = code;
        secondsRemaining = mins * 60;
        document.getElementById("lobbyArea").style.display = "none";
        document.getElementById("roomArea").style.display = "block";
        document.getElementById("roomCodeText").innerText = code;

        db.collection("study_rooms").doc(code).collection("members").doc(myName).set({ name: myName, joined: Date.now() });

        db.collection("study_rooms").doc(code).collection("chat").orderBy("time", "asc").onSnapshot(snap => {
            const display = document.getElementById("chatDisplay");
            display.innerHTML = "";
            snap.forEach(doc => { display.innerHTML += `<div class="msg"><b>${doc.data().user}:</b> ${doc.data().text}</div>`; });
            display.scrollTop = display.scrollHeight;
        });

        db.collection("study_rooms").doc(code).collection("members").onSnapshot(snap => {
            const list = document.getElementById("memberList");
            list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<span class="member-pill">${doc.data().name}</span>`; });
        });

        startCountdown();
    }

    function startCountdown() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(secondsRemaining > 0) {
                secondsRemaining--;
                let m = Math.floor(secondsRemaining / 60);
                let s = secondsRemaining % 60;
                document.getElementById("timer").innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if(secondsRemaining === 0) finishMission();
            }
        }, 1000);
    }

    function finishMission() {
        clearInterval(timerInterval);
        document.getElementById("ambiencePlayer").pause();
        new Audio('mission_complete.mp3').play().catch(e => {});

        // Save Stats
        let xp = parseInt(localStorage.getItem("pancow_xp") || "0");
        let dxp = parseInt(localStorage.getItem("pancow_daily_xp") || "0");
        localStorage.setItem("pancow_xp", xp + parseInt(missionMins));
        localStorage.setItem("pancow_daily_xp", dxp + parseInt(missionMins));

        document.getElementById("earnedXP").innerText = missionMins + "m";
        document.getElementById("congratsOverlay").style.display = "flex";
    }

    function updateAmbience() {
        const p = document.getElementById("ambiencePlayer");
        const v = document.getElementById("ambienceSelect").value;
        if(v === "none") p.pause();
        else { p.src = v; p.play().catch(e => alert("Click screen once to enable sound!")); }
    }

    function sendMessage() {
        const i = document.getElementById("chatInput");
        if(!i.value) return;
        db.collection("study_rooms").doc(currentRoom).collection("chat").add({ user: myName, text: i.value, time: Date.now() });
        i.value = "";
    }
</script>
</body>
</html>
